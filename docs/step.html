<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Code GitHub Copilot Agent Lab| Edição Pokédex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="step.css">
    <link rel="stylesheet" href="light-theme.css">
    <script src="theme-toggle.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="header-brand">
                <span>🔴</span>
                <span class="header-title">Pokédex Agent Lab</span>
            </a>
            <nav class="header-nav">
                <button class="theme-toggle" onclick="toggleTheme()">☀️ Light</button>
                <button class="nav-btn" id="prevBtn" disabled>← Anterior</button>
                <button class="nav-btn" id="nextBtn">Próximo →</button>
            </nav>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Partes do Laboratório</div>
                <nav id="stepNav"></nav>
            </div>
        </aside>

        <main class="main">
            <article class="content">
                <div id="markdown-content" class="markdown">
                    <div class="loading">Carregando conteúdo...</div>
                </div>
                <nav class="nav-footer">
                    <a href="#" class="nav-footer-btn disabled" id="prevLink">← Anterior</a>
                    <a href="#" class="nav-footer-btn" id="nextLink">Próximo →</a>
                </nav>
            </article>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script>
        const steps = [
            { id: 'guide',           file: 'GUIDE.md',           title: 'Referência Rápida',           number: '📚' },
            { id: '00-overview',     file: '00-overview.md',     title: 'Visão Geral & Checklist',     number: '00' },
            { id: '01-setup',        file: '01-setup.md',        title: 'Configuração e Contexto',     number: '01' },
            { id: '02-favorites',    file: '02-favorites.md',    title: 'Favoritos e Descoberta',      number: '02' },
            { id: '03-team-builder', file: '03-team-builder.md', title: 'Montador de Equipes',           number: '03' },
            { id: '04-complete',     file: '04-complete.md',     title: '🎉 Concluído!',                 number: '🎉' },
        ];

        // Use relative paths locally, GitHub raw in production (GitHub Pages)
        const isLocal = ['localhost', '127.0.0.1', ''].includes(location.hostname) || location.protocol === 'file:';
        const GITHUB_RAW_BASE = isLocal
            ? '../workshop/'
            : 'https://raw.githubusercontent.com/cyz/devdays-pokedex/main/workshop/';

        const CHECKBOX_STATE_KEY_PREFIX = 'workshop-checkboxes:';
        const COPY_STATUS_RESET_DELAY = 2000;
        const pendingCopyResetTimers = new Set();

        function celebrate() {
            const duration = 3000;
            const end = Date.now() + duration;
            const colors = ['#00f5ff', '#ff00ff', '#b366ff', '#00ff88', '#ffff00'];
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function getCurrentStepId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('step') || '00-overview';
        }

        function getCurrentStepIndex() {
            return steps.findIndex(s => s.id === getCurrentStepId());
        }

        function buildSidebar() {
            const nav = document.getElementById('stepNav');
            const currentId = getCurrentStepId();
            nav.innerHTML = steps.map(step => `
                <a href="?step=${step.id}" class="step-link ${step.id === currentId ? 'active' : ''}">
                    <span class="step-number">${step.number}</span>
                    <span>${step.title}</span>
                </a>
            `).join('');
        }

        function updateNavigation() {
            const idx = getCurrentStepIndex();
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevLink = document.getElementById('prevLink');
            const nextLink = document.getElementById('nextLink');

            prevBtn.disabled = idx <= 0;
            nextBtn.disabled = idx >= steps.length - 1;
            prevBtn.onclick = () => idx > 0 && (window.location.search = `?step=${steps[idx - 1].id}`);
            nextBtn.onclick = () => idx < steps.length - 1 && (window.location.search = `?step=${steps[idx + 1].id}`);

            if (idx > 0) {
                prevLink.href = `?step=${steps[idx - 1].id}`;
                prevLink.textContent = `← ${steps[idx - 1].title}`;
                prevLink.classList.remove('disabled');
            } else {
                prevLink.classList.add('disabled');
                prevLink.textContent = '← Anterior';
            }

            if (idx < steps.length - 1) {
                nextLink.href = `?step=${steps[idx + 1].id}`;
                nextLink.textContent = `${steps[idx + 1].title} →`;
                nextLink.classList.remove('disabled');
            } else {
                nextLink.classList.add('disabled');
                nextLink.textContent = 'Próximo →';
            }
        }

        function processMarkdown(md) {
            // Remove nav links used in markdown files
            md = md.replace(/\[📚 Quick Reference\][^\n]+\n+---/g, '');
            md = md.replace(/\[📚 Quick Reference\][^\n]+/g, '');
            md = md.replace(/\[← README\][^\n]+/g, '');
            md = md.replace(/\[← Overview\][^\n]+/g, '');
            md = md.replace(/\[← Part \d+\][^\n]+/g, '');
            md = md.replace(/👉 \*\*\[Continue to[^\n]+/g, '');
            md = md.replace(/👉 \*\*\[Start with[^\n]+/g, '');

            // Convert internal markdown links to step viewer links
            md = md.replace(/\]\((\d+)-([^)]+)\.md\)/g, '](step.html?step=$1-$2)');
            md = md.replace(/\]\(GUIDE\.md\)/g, '](step.html?step=guide)');

            // Handle GitHub-style alerts
            md = md.replace(/>\s*💡\s*\*\*Tip:\*\*/gi, '> **💡 Tip**');
            md = md.replace(/>\s*💡\s*\*\*(Optional)[,:]\*\*/gi, '> **💡 $1**');
            md = md.replace(/>\s*💡\s*\*\*(Think about)[,:]\*\*/gi, '> **💡 $1**');

            // Clean up multiple consecutive horizontal rules
            md = md.replace(/---\s*\n\s*---/g, '---');

            return md;
        }

        function getCheckboxStorageKey(stepId) {
            return `${CHECKBOX_STATE_KEY_PREFIX}${stepId}`;
        }

        function setupInteractiveCheckboxes(stepId) {
            const container = document.getElementById('markdown-content');
            if (!container) return;
            const checkboxes = container.querySelectorAll('input[type="checkbox"]');
            if (!checkboxes.length) return;

            const storageKey = getCheckboxStorageKey(stepId);
            let checkedIndexes = [];

            try {
                checkedIndexes = JSON.parse(localStorage.getItem(storageKey) || '[]');
                if (!Array.isArray(checkedIndexes)) checkedIndexes = [];
            } catch {
                checkedIndexes = [];
            }

            checkboxes.forEach((checkbox, index) => {
                checkbox.disabled = false;
                checkbox.checked = checkedIndexes.includes(index) || checkbox.checked;
                checkbox.setAttribute('aria-label', `Checklist item ${index + 1}`);

                checkbox.addEventListener('change', () => {
                    const updated = Array.from(checkboxes)
                        .reduce((acc, cb, i) => {
                            if (cb.checked) acc.push(i);
                            return acc;
                        }, []);
                    localStorage.setItem(storageKey, JSON.stringify(updated));
                });
            });
        }

        async function copyCodeToClipboard(text) {
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
                return;
            }
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'absolute';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            const copied = document.execCommand('copy');
            document.body.removeChild(textarea);
            if (!copied) throw new Error('Fallback copy failed');
        }

        function setupCodeBlockCopyButtons() {
            const container = document.getElementById('markdown-content');
            if (!container) return;
            const codeBlocks = container.querySelectorAll('pre');

            codeBlocks.forEach((pre) => {
                const code = pre.querySelector('code');
                const codeText = code?.textContent?.trim();
                if (!codeText) return;

                const copyButton = document.createElement('button');
                copyButton.type = 'button';
                copyButton.className = 'code-copy-btn';
                copyButton.textContent = 'Copiar';
                copyButton.setAttribute('aria-label', 'Copiar código');

                const liveRegion = document.createElement('span');
                liveRegion.className = 'sr-only';
                liveRegion.setAttribute('aria-live', 'polite');
                let resetTimer = null;

                const resetButtonState = () => {
                    copyButton.textContent = 'Copiar';
                    copyButton.dataset.state = 'idle';
                    liveRegion.textContent = '';
                };

                copyButton.addEventListener('click', async () => {
                    if (resetTimer) {
                        clearTimeout(resetTimer);
                        pendingCopyResetTimers.delete(resetTimer);
                    }
                    try {
                        await copyCodeToClipboard(codeText);
                        copyButton.textContent = 'Copiado!';
                        copyButton.dataset.state = 'copied';
                        liveRegion.textContent = 'Código copiado para a área de transferência';
                    } catch {
                        copyButton.textContent = 'Falhou';
                        copyButton.dataset.state = 'error';
                        liveRegion.textContent = 'Incapaz de copiar o código';
                    }
                    resetTimer = setTimeout(() => {
                        pendingCopyResetTimers.delete(resetTimer);
                        resetTimer = null;
                        resetButtonState();
                    }, COPY_STATUS_RESET_DELAY);
                    pendingCopyResetTimers.add(resetTimer);
                });

                pre.append(copyButton, liveRegion);
            });
        }

        async function loadContent() {
            const idx = getCurrentStepIndex();
            if (idx === -1) {
                document.getElementById('markdown-content').innerHTML = '<p>Passo não encontrado. <a href="?step=00-overview">Ir para Visão Geral</a></p>';
                return;
            }

            const step = steps[idx];
            document.title = `${step.title} | Pokédex Agent Lab`;

            try {
                pendingCopyResetTimers.forEach(timer => clearTimeout(timer));
                pendingCopyResetTimers.clear();

                const response = await fetch(`${GITHUB_RAW_BASE}${step.file}`);
                if (!response.ok) throw new Error('Failed to load');

                let md = await response.text();
                md = processMarkdown(md);

                // Fix relative image paths
                const stepDir = step.file.substring(0, step.file.lastIndexOf('/') + 1);
                md = md.replace(/!\[([^\]]*)\]\((?!https?:\/\/|\/\/)([^)]+)\)/g, (match, alt, path) => {
                    const cleanPath = path.replace(/^\.\//, '');
                    return `![${alt}](${GITHUB_RAW_BASE}${stepDir}${cleanPath})`;
                });

                marked.setOptions({ breaks: true, gfm: true });
                document.getElementById('markdown-content').innerHTML = marked.parse(md);
                setupInteractiveCheckboxes(step.id);
                setupCodeBlockCopyButtons();

                // Add event listener to confetti button if it exists
                const confettiBtn = document.getElementById('confettiBtn');
                if (confettiBtn) {
                    confettiBtn.onclick = celebrate;
                }

                if (step.id === '04-complete') {
                    setTimeout(celebrate, 500);
                }
            } catch (error) {
                document.getElementById('markdown-content').innerHTML = `
                    <h1>Erro ao Carregar o Conteúdo</h1>
                    <p>Não foi possível carregar <code>${step.file}</code>.</p>
                    <p>Se estiver rodando localmente, certifique-se de que está servindo os arquivos por meio de um servidor local (ex: VS Code Live Server ou <code>npx serve docs</code>).</p>
                    <p><a href="index.html">Retornar à página inicial</a></p>
                `;
            }
        }

        buildSidebar();
        updateNavigation();
        loadContent();

        document.addEventListener('keydown', (e) => {
            const idx = getCurrentStepIndex();
            if (e.key === 'ArrowLeft' && idx > 0) {
                window.location.search = `?step=${steps[idx - 1].id}`;
            } else if (e.key === 'ArrowRight' && idx < steps.length - 1) {
                window.location.search = `?step=${steps[idx + 1].id}`;
            }
        });
    </script>
</body>
</html>
